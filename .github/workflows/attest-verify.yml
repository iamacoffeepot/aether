name: Attestation verify

# Runs on pull_request_target so the gate logic always comes from the trusted
# base branch, never the PR head. The job only reads the attestation side ref
# and the author's public keys — it never checks out or runs PR-head code, so
# the usual pull_request_target risk (executing untrusted code with a write
# token) does not apply here.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: attest-verify-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out base (trusted verifier logic)
        uses: actions/checkout@v4

      # An attestation only stands in for the heavy CI jobs, so it is only
      # required when those jobs would run. This mirrors ci.yml's `changes`
      # filter (the union that triggers any heavy job, qodana included): a
      # docs-only / scripts-only / config-only PR produces no code to attest, so
      # the steps below skip and the job concludes success — `verify` passes
      # through exactly as clippy/test/qodana skip in ci.yml. Keep this set in
      # lockstep with ci.yml's `changes` filter.
      - name: Detect code-producing changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'
              - 'qodana.yaml'

      - name: Install witness
        if: steps.filter.outputs.code == 'true'
        run: |
          cd "$(mktemp -d)"
          base=https://github.com/in-toto/witness/releases/download/v0.11.0
          curl -sSL -O "$base/witness_0.11.0_linux_amd64.tar.gz"
          curl -sSL -O "$base/witness_0.11.0_checksums.txt"
          grep ' witness_0.11.0_linux_amd64.tar.gz$' witness_0.11.0_checksums.txt | sha256sum -c -
          tar xzf witness_0.11.0_linux_amd64.tar.gz witness
          sudo install witness /usr/local/bin/witness
          witness version

      - name: Install sshpk-conv
        if: steps.filter.outputs.code == 'true'
        # `sudo` so npm can write its global man-page symlinks under
        # /usr/local/share/man — the default runner user can't, which fails the
        # plain `-g` install (EACCES) on the Node 24 runner image. Mirrors the
        # `sudo install` used for witness above. `ssh-keygen` can't substitute:
        # its PKCS8 export rejects ed25519, the key type this gate signs with.
        run: sudo npm install -g sshpk@1.18.0

      - name: Verify attestations
        if: steps.filter.outputs.code == 'true'
        env:
          REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: scripts/attest-verify.sh

      - name: No code-producing changes
        if: steps.filter.outputs.code != 'true'
        run: echo "no code-producing changes; attestation not required, deferring to the light CI checks"
