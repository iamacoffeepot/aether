name: Perf compare

# Noise-aware dispatch perf comparison for a PR (iamacoffeepot/aether#1077,
# ADR-0085). Builds the latency sweep binary from the PR and its
# merge-base, interleaves K trials of each on one runner (the pairing
# that cancels run-to-run drift), and posts a sticky comparison comment.
#
# Informational by construction: this workflow's job is NOT in ci.yml's
# `ci-pass` aggregator, so a regression never blocks a merge (ADR-0085
# §4). Cost-bounded: path-filtered + label-gated, so it does not run on
# every PR. The path filter watches the whole substrate runtime, not a
# hand-picked file list — the dispatch hot path is spread across
# scheduler / mail / actor / chassis and moves over time (a narrow list
# silently went stale and skipped the iamacoffeepot/aether#1116 blob-demux
# change, which lives in `actor/native/`). Substrate changes the harness
# can't measure (fs adapters, handle store, capture) produce a no-delta
# run; suppress those per-PR with the `perf-skip` label.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# Perf runs are expensive (two release builds + K interleaved trials);
# cancel a superseded run when the PR is pushed again.
concurrency:
  group: perf-compare-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect dispatch-path changes
    runs-on: ubuntu-latest
    outputs:
      perf: ${{ steps.filter.outputs.perf }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            perf:
              - 'crates/aether-substrate/src/**'
              - 'crates/aether-substrate-bundle/src/perf/**'

  compare:
    name: Compare dispatch perf vs merge-base
    needs: changes
    # Auto-run on any substrate-runtime / perf-harness path change, or
    # when the `perf` label is present; force-skip with `perf-skip`.
    if: >-
      !contains(github.event.pull_request.labels.*.name, 'perf-skip') &&
      (needs.changes.outputs.perf == 'true' ||
       contains(github.event.pull_request.labels.*.name, 'perf'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Candidate build + interleaved trials. The base build is skipped on a
    # cache hit (iamacoffeepot/aether#1084) and shares the candidate's
    # target dir when cold. Cap so a stall doesn't burn the quota.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # merge-base needs full history (scripts/perf-compare.sh).
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps (ALSA for cpal, Mesa lavapipe for wgpu)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
          mesa-vulkan-drivers
      - uses: Swatinem/rust-cache@v2
      # Cache the base (merge-base) trial binary across pushes
      # (iamacoffeepot/aether#1084). The merge-base is fixed for a PR's
      # life, so once built it can be reused on every re-push, skipping
      # the cold dependency compile. Key on the merge-base sha + the
      # toolchain (rustc tracks `stable`, so a compiler bump rebuilds the
      # base with the same rustc as the candidate — keeping the paired
      # comparison apples-to-apples).
      - name: Resolve base cache key
        id: perfbase
        run: |
          git fetch --no-tags --quiet origin main
          {
            echo "base=$(git merge-base HEAD FETCH_HEAD)"
            echo "rustc=$(rustc -V | sha256sum | cut -c1-12)"
          } >> "$GITHUB_OUTPUT"
      - name: Cache base perf-trial binary
        uses: actions/cache@v4
        with:
          path: .perf-cache/aether-perf-trial-base
          key: >-
            perf-base-${{ runner.os }}-${{ steps.perfbase.outputs.rustc }}-${{ steps.perfbase.outputs.base }}
      - name: Run perf comparison
        env:
          PERF_BASE_CACHE: ${{ github.workspace }}/.perf-cache/aether-perf-trial-base
        run: scripts/perf-compare.sh
      # iamacoffeepot/aether#1155: render the candidate's per-cell
      # queued/drain/handler sample distributions (the shape the
      # percentile table can't show) and upload them as artifacts.
      # Candidate-only for now — the merge-base binary has no plot
      # surface, so a base-vs-candidate overlay waits until this lands.
      # `continue-on-error` keeps a plot hiccup from reddening this
      # informational job.
      - name: Render candidate span distributions
        continue-on-error: true
        env:
          AETHER_PERF_WORKERS: max,2
          AETHER_PERF_TOPOS: ci
          AETHER_PERF_FRAMES: "200"
          AETHER_PERF_PLOT_DIR: perf-plots
        run: |
          cargo build --release -p aether-substrate-bundle \
            --bin aether-perf-plot
          ./target/release/aether-perf-plot
      - name: Upload span-distribution plots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-span-distributions
          path: perf-plots/
          if-no-files-found: warn
      - name: Upsert sticky PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          marker='<!-- aether-perf-report -->'
          body="$(cat perf-report.md)"
          # Find an existing comment carrying our marker (sticky upsert,
          # so a re-push edits in place instead of spamming new comments).
          existing="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq "map(select(.body | contains(\"$marker\"))) | .[0].id // empty")"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$existing" -f body="$body" >/dev/null
            echo "updated sticky comment $existing"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
            echo "created sticky comment"
          fi
