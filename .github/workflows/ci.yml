name: CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Install ALSA dev headers (cpal Linux backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install ALSA dev headers (cpal Linux backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      # `[workspace.lints.rustdoc]` in the root Cargo.toml tracks the
      # rustdoc lints at `warn`. RUSTDOCFLAGS escalates the tracked
      # set to hard failures here without poisoning local `cargo doc`
      # runs. Phase 5c (iamacoffeepot/aether#913) swept the broken /
      # private intra-doc-link backlog so all three can deny now.
      - name: cargo doc with tracked rustdoc lints denied
        env:
          RUSTDOCFLAGS: >-
            -D rustdoc::redundant_explicit_links
            -D rustdoc::broken_intra_doc_links
            -D rustdoc::private_intra_doc_links
        run: cargo doc --workspace --no-deps

  # Workspace-wide tests run on linux only. Non-chassis crates
  # (aether-kinds, aether-data, aether-actor, aether-actor-derive,
  # demo components) are pure Rust with no per-OS behavior — a matrix
  # triples CI time without catching anything new. See ADR-0035 § CI
  # matrix scope.
  test:
    name: Test (workspace, linux)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Normal run is ≤ 2 min; cap at 15 so a hang doesn't eat the
    # default 6h quota before anyone notices. If this tripping
    # becomes routine, lower it — routine failure is a signal.
    timeout-minutes: 15
    steps:
      # Issue #612: fetch-depth 2 (PR) / 0 (push) so the changed-crate
      # filter in `Run tests` can `git diff HEAD^1 HEAD` (or against
      # `event.before`/`after`). PR #610 originally added a second
      # `actions/checkout@v3` after pre-build to get this history; the
      # default `clean: true` on that re-checkout wiped the wasm
      # artifacts the pre-build step had just produced, so scenario
      # tests (gated by AETHER_REQUIRE_RUNTIME) panicked. Configuring
      # fetch-depth on the initial checkout keeps target/ alive into
      # the test step.
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Linux deps (ALSA for cpal, Mesa lavapipe for wgpu)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
          mesa-vulkan-drivers
      - uses: Swatinem/rust-cache@v2
      # Pre-build component wasm artifacts the scenario runner loads
      # at test time. Without this, ADR-0067 per-component scenarios
      # silently skip in CI ("wasm not built"). Cheap to build —
      # the wasm targets are tiny next to the host workspace and
      # rust-cache picks up the wasm artifacts on subsequent runs.
      # Component crates are discovered from `cargo metadata` by two
      # structural signals (issue 439): the package declares a
      # `cdylib` lib target AND depends on `aether-actor`. The dep
      # IS the component contract — anything that imports the SDK
      # (init, receive_p32, MailTransport, etc.) deps on it; anything
      # that doesn't isn't a component. No filename convention to
      # remember and no static list to keep in sync. (Pre issue-552
      # the dep signal was `aether-component`; that crate folded into
      # `aether-actor` in stage 0, so the marker name moves with it.)
      # `AETHER_REQUIRE_RUNTIME=1` on the test step turns any missing
      # wasm into a hard failure so a discovery miss is loud, not silent.
      - name: Pre-build component wasm for scenario tests
        # Issue 552 stage 1.5: build each component crate in its own
        # cargo invocation so feature unification stays per-package.
        # Consolidated component crates (e.g. `aether-camera`) gate
        # their `aether_actor::export!()` FFI emission behind a default
        # `runtime` feature; trunk-type consumers (sokoban) opt out via
        # `default-features = false`. A multi-package `-p A -p B` build
        # would feature-unify, re-enabling `runtime` for the trunk
        # consumer's transitive view → wasm-lld duplicate-symbol on
        # `init` / `receive_p32`. Per-package invocations keep each
        # build's feature resolve independent.
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --format-version=1 --no-deps |
            jq -r '.packages[]
              | select(.targets[] | .kind | contains(["cdylib"]))
              | select([.dependencies[] | .name] | contains(["aether-actor"]))
              | .name')
          if [ -z "$pkgs" ]; then
            echo "no wasm component crates discovered"; exit 1
          fi
          echo "Building wasm for:"; echo "$pkgs"
          while read -r pkg; do
            [ -z "$pkg" ] && continue
            cargo build --target wasm32-unknown-unknown -p "$pkg"
          done <<< "$pkgs"
      # Run the full workspace test suite under nextest. The
      # changed-crate filter the prior step had is gone — nextest's
      # process-per-test isolation surfaces cross-test contamination
      # that the per-crate filter could mask, and the CI profile's
      # `slow-timeout` bounds runaway tests cleanly.
      - name: Install latest nextest release
        uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --all-features --profile ci
        env:
          AETHER_REQUIRE_RUNTIME: "1"

  # Qodana scan folded in from .github/workflows/qodana.yml so the
  # ci-pass aggregator can needs: it directly (iamacoffeepot/aether#941).
  # No `needs: changes` gate — Qodana scans the whole workspace and we
  # want it to fire on docs/workflow-only PRs too. The cache cycle is
  # split out of qodana-action so we can interleave an ownership chown
  # between the root-written scan and the tar save (qodana-action's
  # built-in save runs inside its own step, before any post-scan step
  # we could add, so we can't fix the ownership in time without taking
  # over the save side).
  qodana:
    name: Qodana scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Restore Qodana cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.1-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            qodana-2026.1-${{ github.ref }}-
            qodana-2026.1-

      - name: Qodana scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          # -u root forwards through `qodana scan` to the underlying
          # `docker run`, keeping the container's design-default user.
          # The qodana-action's wrapper otherwise passes `-u $(id -u)`
          # to preserve the runner user's ownership of the workspace
          # dir — but that flips the container to non-root, and the
          # baked /usr/local/cargo (registry + global-cache) is
          # root-owned, so cargo metadata perm-denies and Qodana
          # leaves the entire workspace unanalysed. Running as root
          # inside the container is the documented default — see
          # https://www.jetbrains.com/help/qodana/docker-image-configuration.html
          # § "Run as a non-root user". The CARGO_HOME override on
          # the prior approach (iamacoffeepot/aether#911) is now
          # unnecessary.
          #
          # --fail-threshold 0 pins the action to fail on any finding
          # instead of relying on the action's default threshold,
          # which could shift across version bumps
          # (iamacoffeepot/aether#941).
          args: --linter qodana-rust -u root --fail-threshold 0
          # We own restore/save (steps above + below); qodana-action's
          # built-in cache save runs root-owned and trips tar exit 2.
          use-caches: false
          # Upload SARIF + qodana.sarif.json as a workflow artifact
          # ('qodana-report') so triagers can grab findings without
          # depending on the JB web dashboard.
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Reclaim qodana cache ownership for tar
        # Qodana ran as root in the container; new cache files inherit
        # uid 0 on the bind-mount. The save step below runs as the
        # runner user (uid 1001) and would tar-exit-2 on those files.
        # Chown the tree back so save can read everything.
        #
        # `if: always()` so the chown still runs when qodana itself
        # exits non-zero on findings. `|| true` because the cache dir
        # may not exist at all if the scan crashed before populating.
        if: always()
        run: |
          if [ -d "${RUNNER_TEMP}/qodana/caches" ]; then
            sudo chown -R "$(id -u):$(id -g)" "${RUNNER_TEMP}/qodana/caches" || true
          fi

      - name: Save Qodana cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.1-${{ github.ref }}-${{ github.sha }}

  # Desktop chassis tests run the full OS matrix because winit event
  # loops, wgpu driver init, and platform-specific frame capture are
  # the only places per-OS coverage catches real bugs. Linux is covered
  # by the workspace job above; this job adds macOS + Windows.
  desktop:
    name: Test desktop (${{ matrix.os }})
    needs: changes
    # only run this job on tagged releases
    if: needs.changes.outputs.code == 'true' && startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    # Normal run is ≤ 2 min; cap at 15 so a runner stall (hub mac
    # CI flaked on 2026-04-21 against PR #164's commit, then
    # re-ran clean on the same SHA) doesn't eat the default 6h
    # quota. Long-term we'd rather treat repeat flakes as a real
    # scheduler/concurrency signal than keep growing this bound.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p aether-substrate-bundle --all-targets

  ci-pass:
    name: CI pass
    if: always()
    needs: [ changes, fmt, clippy, docs, test, desktop, qodana ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "fmt:     ${{ needs.fmt.result }}"
          echo "clippy:  ${{ needs.clippy.result }}"
          echo "docs:    ${{ needs.docs.result }}"
          echo "test:    ${{ needs.test.result }}"
          echo "desktop: ${{ needs.desktop.result }}"
          echo "qodana:  ${{ needs.qodana.result }}"
          fail=0
          [[ "${{ needs.changes.result }}" == "success" ]] || fail=1
          [[ "${{ needs.fmt.result }}"     == "success" ]] || fail=1
          [[ "${{ needs.clippy.result }}"  == "success" || "${{ needs.clippy.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.docs.result }}"    == "success" || "${{ needs.docs.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.test.result }}"    == "success" || "${{ needs.test.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.desktop.result }}" == "success" || "${{ needs.desktop.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.qodana.result }}"  == "success" ]] || fail=1
          exit $fail
