name: CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      qodana: ${{ steps.filter.outputs.qodana }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'
            # Qodana's gate is the code set plus its own config, so a
            # qodana.yaml edit still triggers a scan even though it
            # changes no Rust.
            qodana:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'
              - 'qodana.yaml'

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  no-dividers:
    name: No divider banners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/check-no-dividers.sh

  hook-tests:
    name: Guardrail hook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .claude/hooks/tests/run.sh

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Install ALSA dev headers (cpal Linux backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install ALSA dev headers (cpal Linux backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      # `[workspace.lints.rustdoc]` in the root Cargo.toml tracks the
      # rustdoc lints at `warn`. RUSTDOCFLAGS escalates the tracked
      # set to hard failures here without poisoning local `cargo doc`
      # runs. Phase 5c (iamacoffeepot/aether#913) swept the broken /
      # private intra-doc-link backlog so all three can deny now.
      - name: cargo doc with tracked rustdoc lints denied
        env:
          RUSTDOCFLAGS: >-
            -D rustdoc::redundant_explicit_links
            -D rustdoc::broken_intra_doc_links
            -D rustdoc::private_intra_doc_links
        run: cargo doc --workspace --no-deps

  # Workspace-wide tests run on linux only. Non-chassis crates
  # (aether-kinds, aether-data, aether-actor, aether-actor-derive,
  # demo components) are pure Rust with no per-OS behavior — a matrix
  # triples CI time without catching anything new. See ADR-0035 § CI
  # matrix scope.
  test:
    name: Test (workspace, linux)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # A warm-cache run is ~13 min (cargo xtask dist + the lightweight
    # build/run + the heavy serial pass), so the old 15-min cap left
    # almost no margin: under runner-load variance the heavy step ran
    # into the wall and the job was cancelled mid-run ("The operation
    # was canceled", no test failure). Cap at 30 — roughly 2× the warm
    # run — so variance no longer trips it, while a genuine hang still
    # can't eat the default 6h quota. Splitting the heavy pass into its
    # own job to cut the warm time back down is tracked separately.
    timeout-minutes: 30
    env:
      # Use mold to reduce peak link memory and speed up the test
      # build — keeps the linker OOM (collect2: ld terminated with
      # signal 7) off the ubuntu runner. CI-scoped so dev machines
      # are unaffected. Companion to the free-disk-space step below.
      # Target-scoped to the native host triple: the wasm32 component
      # cross-build links with rust-lld, which rejects -fuse-ld=mold,
      # so a job-wide RUSTFLAGS would break it.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -Clink-arg=-fuse-ld=mold
      # line-tables-only (instead of full DWARF) shrinks test
      # binaries and the linked artifacts on disk, reducing the
      # chance of hitting "no space left on device" even after
      # the free-disk-space reclaim.
      CARGO_PROFILE_TEST_DEBUG: line-tables-only
    steps:
      # Issue #612: fetch-depth 2 (PR) / 0 (push) so the changed-crate
      # filter in `Run tests` can `git diff HEAD^1 HEAD` (or against
      # `event.before`/`after`). PR #610 originally added a second
      # `actions/checkout@v3` after pre-build to get this history; the
      # default `clean: true` on that re-checkout wiped the wasm
      # artifacts the pre-build step had just produced, so scenario
      # tests (gated by AETHER_REQUIRE_RUNTIME) panicked. Configuring
      # fetch-depth on the initial checkout keeps target/ alive into
      # the test step.
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
      # Reclaim ~20–30 GB by removing preinstalled Android / .NET /
      # Haskell tooling that the build never uses. Runs before the
      # rust-toolchain step so cargo's own build artifacts have the
      # most headroom. Swap is kept (swap-storage: false) to avoid
      # degrading the linker under memory pressure.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: 'true'
          dotnet: 'true'
          haskell: 'true'
          swap-storage: 'false'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Linux deps (ALSA for cpal, Mesa lavapipe for wgpu, mold linker)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
          mesa-vulkan-drivers mold
      - uses: Swatinem/rust-cache@v2
      # Pre-build the packaged artifact tree the scenario runner loads
      # at test time. Without this, ADR-0067 per-component scenarios
      # silently skip in CI ("wasm not built"); `AETHER_REQUIRE_RUNTIME=1`
      # on the test step turns any missing wasm into a hard failure so a
      # discovery miss is loud, not silent. `cargo xtask dist` discovers
      # component crates structurally (issue 439): a package depending on
      # `aether-actor` that exposes a `cdylib` lib or `[[example]]` target.
      # The dep IS the component contract — anything importing the SDK
      # (init, receive_p32, MailTransport, etc.) deps on it. Each package
      # cross-builds in its own cargo invocation: consolidated component
      # crates (e.g. `aether-camera`) gate their `aether_actor::export!()`
      # FFI emission behind a default `runtime` feature, and trunk-type
      # consumers opt out via `default-features = false`. A
      # multi-package build would feature-unify, re-enabling `runtime` for
      # the trunk consumer → wasm-lld duplicate-symbol on `init` /
      # `receive_p32`; xtask keeps each build's feature resolve isolated.
      # The wasm lands under `target/wasm32-unknown-unknown/` (where the
      # scenario tests read it) as well as `dist/`.
      - name: Pre-build component wasm for scenario tests
        run: cargo xtask dist
      # Run the full workspace test suite under nextest. The
      # changed-crate filter the prior step had is gone — nextest's
      # process-per-test isolation surfaces cross-test contamination
      # that the per-crate filter could mask, and the CI profile's
      # `slow-timeout` bounds runaway tests cleanly. The whole suite runs
      # at full parallelism; the `aether-substrate-bundle` integration
      # tests that fork real substrates carry a generous per-test
      # slow-timeout in `.config/nextest.toml` so concurrent fork
      # contention stretches their wall-clock without tripping the
      # steady-state cap.
      - name: Install latest nextest release
        uses: taiki-e/install-action@nextest
      - name: Run tests (workspace, parallel)
        run: cargo nextest run --all-features --profile ci
        env:
          AETHER_REQUIRE_RUNTIME: "1"

  # Qodana scan folded in from .github/workflows/qodana.yml so the
  # ci-pass aggregator can needs: it directly (iamacoffeepot/aether#941).
  # Gated on the `qodana` changes filter (code paths + qodana.yaml) so a
  # docs / .claude / scripts-only PR skips it instead of blocking the
  # merge gate on a multi-minute scan with no Rust to analyze
  # (iamacoffeepot/aether#1089); ci-pass accepts a skipped qodana the
  # same way it does clippy/docs/test. The cache cycle is split out of
  # qodana-action so we can interleave an ownership chown between the
  # root-written scan and the tar save (qodana-action's built-in save
  # runs inside its own step, before any post-scan step we could add, so
  # we can't fix the ownership in time without taking over the save side).
  qodana:
    name: Qodana scan
    needs: changes
    if: needs.changes.outputs.qodana == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Restore Qodana cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.1-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            qodana-2026.1-${{ github.ref }}-
            qodana-2026.1-

      - name: Qodana scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          # -u root forwards through `qodana scan` to the underlying
          # `docker run`, keeping the container's design-default user.
          # The qodana-action's wrapper otherwise passes `-u $(id -u)`
          # to preserve the runner user's ownership of the workspace
          # dir — but that flips the container to non-root, and the
          # baked /usr/local/cargo (registry + global-cache) is
          # root-owned, so cargo metadata perm-denies and Qodana
          # leaves the entire workspace unanalysed. Running as root
          # inside the container is the documented default — see
          # https://www.jetbrains.com/help/qodana/docker-image-configuration.html
          # § "Run as a non-root user". The CARGO_HOME override on
          # the prior approach (iamacoffeepot/aether#911) is now
          # unnecessary.
          #
          # The fail-threshold lives in qodana.yaml (`failThreshold`),
          # the single source of truth this job reads. It stays explicit there
          # (not the action's default, which could shift across version
          # bumps — iamacoffeepot/aether#941), so no --fail-threshold
          # CLI override here, which would shadow the yaml value.
          args: --linter qodana-rust -u root
          # We own restore/save (steps above + below); qodana-action's
          # built-in cache save runs root-owned and trips tar exit 2.
          use-caches: false
          # Upload SARIF + qodana.sarif.json as a workflow artifact
          # ('qodana-report') so triagers can grab findings without
          # depending on the JB web dashboard.
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Reclaim qodana cache ownership for tar
        # Qodana ran as root in the container; new cache files inherit
        # uid 0 on the bind-mount. The save step below runs as the
        # runner user (uid 1001) and would tar-exit-2 on those files.
        # Chown the tree back so save can read everything.
        #
        # `if: always()` so the chown still runs when qodana itself
        # exits non-zero on findings. `|| true` because the cache dir
        # may not exist at all if the scan crashed before populating.
        if: always()
        run: |
          if [ -d "${RUNNER_TEMP}/qodana/caches" ]; then
            sudo chown -R "$(id -u):$(id -g)" "${RUNNER_TEMP}/qodana/caches" || true
          fi

      - name: Save Qodana cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.1-${{ github.ref }}-${{ github.sha }}

  # Desktop chassis tests run the full OS matrix because winit event
  # loops, wgpu driver init, and platform-specific frame capture are
  # the only places per-OS coverage catches real bugs. Linux is covered
  # by the workspace job above; this job adds macOS + Windows.
  desktop:
    name: Test desktop (${{ matrix.os }})
    needs: changes
    # only run this job on tagged releases
    if: needs.changes.outputs.code == 'true' && startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    # Normal run is ≤ 2 min; cap at 15 so a runner stall (hub mac
    # CI flaked on 2026-04-21 against PR #164's commit, then
    # re-ran clean on the same SHA) doesn't eat the default 6h
    # quota. Long-term we'd rather treat repeat flakes as a real
    # scheduler/concurrency signal than keep growing this bound.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p aether-substrate-bundle --all-targets

  ci-pass:
    name: CI pass
    if: always()
    needs: [ changes, fmt, no-dividers, hook-tests, clippy, docs, test, desktop, qodana ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "fmt:     ${{ needs.fmt.result }}"
          echo "no-dividers: ${{ needs.no-dividers.result }}"
          echo "hook-tests: ${{ needs.hook-tests.result }}"
          echo "clippy:  ${{ needs.clippy.result }}"
          echo "docs:    ${{ needs.docs.result }}"
          echo "test:    ${{ needs.test.result }}"
          echo "desktop: ${{ needs.desktop.result }}"
          echo "qodana:  ${{ needs.qodana.result }}"
          fail=0
          [[ "${{ needs.changes.result }}" == "success" ]] || fail=1
          [[ "${{ needs.fmt.result }}"     == "success" ]] || fail=1
          [[ "${{ needs.no-dividers.result }}" == "success" ]] || fail=1
          [[ "${{ needs.hook-tests.result }}" == "success" ]] || fail=1
          [[ "${{ needs.clippy.result }}"  == "success" || "${{ needs.clippy.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.docs.result }}"    == "success" || "${{ needs.docs.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.test.result }}"    == "success" || "${{ needs.test.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.desktop.result }}" == "success" || "${{ needs.desktop.result }}" == "skipped" ]] || fail=1
          [[ "${{ needs.qodana.result }}"  == "success" || "${{ needs.qodana.result }}" == "skipped" ]] || fail=1
          exit $fail
