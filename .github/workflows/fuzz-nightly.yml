name: fuzz-nightly

# Coverage-guided fuzz of `aether_codec::decode_schema` and the
# `aether_data::wire` roundtrip / panic-freedom targets, off the merge
# critical path (issue 1562, issue 1982). cargo-fuzz needs nightly and is
# unbounded by design, so it runs on a schedule, never as a `ci-pass` gate.
# A crash uploads its reproducer and files (or comments on) a triage issue.
# `workflow_dispatch` runs it on demand without waiting for the nightly tick.
# Scheduled workflows fire only from the file on `main`, run in UTC, and can
# be delayed under load — all fine for a nightly.

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        target: [decode_schema, wire_roundtrip, wire_decode_str, wire_decode_seq, wire_decode_enum]
    env:
      FUZZ_TARGET: ${{ matrix.target }}
      # Per-run time box. 300s warm accretes coverage on top of the
      # persisted corpus rather than restarting cold each night.
      MAX_TOTAL_TIME: "300"
      # The repo pins a stable toolchain in `rust-toolchain.toml`, which
      # takes precedence over the nightly the step below installs as the
      # default. cargo-fuzz builds with `-Zsanitizer=address`, a
      # nightly-only flag, so the inner `cargo build` would resolve to
      # stable and fail. `RUSTUP_TOOLCHAIN` sits above the toolchain file
      # in rustup's override order and propagates to that nested build,
      # forcing the whole fuzz build onto nightly without touching the pin.
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      # A unique key per run always misses on an exact match, so the
      # post-step always saves — persisting the warm `fuzz/target/`, the
      # installed cargo-fuzz binary, and the corpus accreted this run.
      # `restore-keys` seeds the next run from the most recent prefix
      # match. Corpus persistence is what makes a 300s nightly build
      # coverage across runs instead of starting from the seeds alone.
      - name: Cache cargo home, fuzz target, and corpus
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            fuzz/target
            fuzz/corpus/${{ matrix.target }}
          key: fuzz-${{ matrix.target }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fuzz-${{ matrix.target }}-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo fuzz --version || cargo install cargo-fuzz

      - name: Run fuzzer (time-boxed)
        run: cargo fuzz run "$FUZZ_TARGET" -- -max_total_time="$MAX_TOTAL_TIME"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore

      # File one triage issue per target and comment subsequent
      # reproducers on it rather than filing duplicates.
      - name: File or update crash issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="fuzz: ${FUZZ_TARGET} crash"

          repros=$(find "fuzz/artifacts/${FUZZ_TARGET}" -type f 2>/dev/null | sort || true)
          if [ -z "$repros" ]; then
            echo "No reproducer files under fuzz/artifacts/${FUZZ_TARGET}; skipping issue."
            exit 0
          fi

          {
            echo "The \`${FUZZ_TARGET}\` nightly fuzz run crashed."
            echo
            echo "- Run: ${RUN_URL}"
            echo "- Reproducers (also attached as the \`fuzz-artifacts-${FUZZ_TARGET}\` artifact):"
            echo
            for f in $repros; do
              echo "  - \`$(basename "$f")\`"
            done
            echo
            echo "Download the artifact, drop the file under \`fuzz/artifacts/${FUZZ_TARGET}/\`, and reproduce locally on nightly:"
            echo
            echo '```'
            echo "cargo fuzz run ${FUZZ_TARGET} fuzz/artifacts/${FUZZ_TARGET}/<file>"
            echo '```'
          } > issue_body.md

          existing=$(gh issue list --state open --search "${title} in:title" \
            --json number,title \
            --jq "map(select(.title == \"${title}\")) | .[0].number // empty")

          if [ -n "$existing" ]; then
            echo "Commenting reproducer on existing issue #${existing}."
            gh issue comment "$existing" --body-file issue_body.md
          else
            echo "Filing new crash issue."
            gh issue create --title "$title" --body-file issue_body.md
          fi
