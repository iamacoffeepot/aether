name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  qodana:
    name: Qodana scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    # Report-only while the EAP linter beds in — Qodana action defaults
    # to exit-non-zero on findings, which would fail PR CI on every
    # false positive. Flip to required by removing this line once the
    # noise floor is understood.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Qodana scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          # -u root forwards through `qodana scan` to the underlying
          # `docker run`, keeping the container's design-default user.
          # The qodana-action's wrapper otherwise passes `-u $(id -u)`
          # to preserve the runner user's ownership of the workspace
          # dir — but that flips the container to non-root, and the
          # baked /usr/local/cargo (registry + global-cache) is
          # root-owned, so cargo metadata perm-denies and Qodana
          # leaves the entire workspace unanalysed. Running as root
          # inside the container is the documented default — see
          # https://www.jetbrains.com/help/qodana/docker-image-configuration.html
          # § "Run as a non-root user". The CARGO_HOME override on
          # the prior approach (#911) is now unnecessary.
          args: --linter qodana-rust -u root
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
      - name: Reclaim qodana cache ownership for tar
        # Qodana ran as root in the container; cache files inherit
        # uid 0 on the bind-mount. qodana-action's post-step then
        # tries to tar the cache as the runner user (uid 1001) and
        # fails with exit code 2 ('No cache found' on the next run,
        # because save never completed). Chown the tree back to the
        # runner user so the post-step can read everything.
        #
        # `if: always()` so the chown still runs when qodana itself
        # exits non-zero on findings. `|| true` because the cache dir
        # may not exist at all if the scan crashed before populating.
        if: always()
        run: |
          if [ -d /home/runner/work/_temp/qodana/caches ]; then
            sudo chown -R "$(id -u):$(id -g)" /home/runner/work/_temp/qodana/caches || true
          fi
