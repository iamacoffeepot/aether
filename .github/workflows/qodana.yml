name: Qodana

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  qodana:
    name: Qodana scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    # Report-only while the EAP linter beds in — Qodana action defaults
    # to exit-non-zero on findings, which would fail PR CI on every
    # false positive. Flip to required by removing this line once the
    # noise floor is understood.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Qodana scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          # Space-separated args. The --env passes CARGO_HOME into the
          # container so cargo metadata doesn't perm-deny on the
          # baked /usr/local/cargo (owned by a different user than
          # Qodana's non-root scan process).
          args: --linter qodana-rust --env CARGO_HOME=/tmp/qodana-cargo
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
