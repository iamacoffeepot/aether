version: "1.0"

# Rust linter — currently EAP (Early Access).
linter: jetbrains/qodana-rust:2026.1-eap

# Recommended profile = full inspection set. Start narrow (starter) if
# the recommended profile is too noisy on the EAP linter; flip back via
# follow-up once we've calibrated.
profile:
  name: qodana.recommended

# Paths Qodana shouldn't analyse.
exclude:
  - name: All
    paths:
      - target
      - .claude
      - .cargo
      - archive
      - spikes

# Override CARGO_HOME so Qodana's non-root scan user can write the
# cargo registry index + global-cache. The container's default
# /usr/local/cargo is owned by a different user, causing
# `cargo metadata` (which Qodana runs to load the workspace) to fail
# with permission-denied — leaving the entire workspace unanalysed.
env:
  - CARGO_HOME=/tmp/qodana-cargo

# No bootstrap: the qodana-rust:2026.1-eap container runs bootstrap as
# a non-root user with no sudo binary and no write access to
# /var/lib/apt, so we cannot apt-get install system packages. Without
# `libasound2-dev` the `cpal` Linux backend won't link, so any crate
# that depends on cpal (aether-substrate-bundle desktop chassis,
# aether-capabilities audio) surfaces as a build error in the scan
# rather than producing inspection findings. Other crates analyze
# fine. Revisit via a custom linter Dockerfile if cpal-bearing
# inspections matter.
