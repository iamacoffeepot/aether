[profile.default]
final-status-level = "slow"

[profile.ci]
# Don't fail fast in CI to run the full test suite.
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 1 }

# The `aether-substrate-bundle` integration tests (FleetBench + the engines /
# routing fleet suites) fork real debug `aether-substrate` processes and wait
# for them to bind. Run concurrently they make timely progress but stretch
# well past the 60s steady-state cap under fork contention, so they carry a
# generous wall-clock backstop — a deadlock guard a healthy run never reaches,
# not a steady-state deadline (same stance as the hub proxy-connect budget,
# iamacoffeepot/aether#2072). `kind(test)` scopes this to the integration
# binaries; the package's unit tests keep the 60s cap.
[[profile.ci.overrides]]
filter = "package(=aether-substrate-bundle) & kind(test)"
slow-timeout = { period = "180s", terminate-after = 1 }

# Trybuild fixtures spawn a nested `cargo` build per `.rs` fixture.
# iamacoffeepot/aether#1275 feature-gated wasmtime out of the
# `aether-derive` fixture dep graph (local wall-clock 240s → 18s on
# our dev boxes); CI's 2-core runners still push it past 60s under
# parallel contention with `aether-data-derive`'s ui binary, so all
# three derive crates (`aether-data-derive`, `aether-derive`,
# `aether-actor-derive`) keep the wider cap. The bigger speedup for
# all three is its own follow-up.
[[profile.ci.overrides]]
filter = "package(=aether-data-derive) | package(=aether-derive) | package(=aether-actor-derive)"
slow-timeout = { period = "300s", terminate-after = 1 }