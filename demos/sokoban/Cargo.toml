[package]
name = "aether-demo-sokoban"
version.workspace = true
edition.workspace = true

[lib]
# `cdylib` is the production artifact (wasm32 build → component). `rlib`
# is added so host builds can link integration tests under `tests/` —
# the crate's own scenario tests load the wasm at runtime, but cargo
# still needs a host-target lib to resolve the test binary against.
crate-type = ["cdylib", "rlib"]

[dependencies]
aether-actor = { path = "../../crates/aether-actor" }
# Marker-only opt-in so `ctx.actor::<RenderCapability>()` resolves
# without dragging wgpu/png into sokoban's wasm graph.
aether-capabilities = { path = "../../crates/aether-capabilities", default-features = false, features = ["render"] }
# `default-features = false` keeps the camera trunk's `runtime` module
# (and its `aether_actor::export!()` FFI exports) out of sokoban's
# wasm build. Without this, both crates' `init` / `receive_p32`
# symbols would collide at wasm-lld time. See
# `aether-camera/Cargo.toml`'s `[features]` block for the rationale.
aether-camera = { path = "../../crates/aether-camera", default-features = false }
aether-kinds = { path = "../../crates/aether-kinds" }
aether-data = { path = "../../crates/aether-data", features = ["derive"] }
bytemuck = { version = "1", default-features = false, features = ["derive"] }

# Integration tests boot a `TestBench`, load the demo's own wasm
# artifact, and assert mail-flow + render properties via `aether-scenario`.
# Tests run host-side; the wasm is built separately for
# `wasm32-unknown-unknown` and discovered at runtime under
# `target/wasm32-unknown-unknown/{debug,release}/`.
[dev-dependencies]
aether-scenario = { path = "../../crates/aether-scenario" }
aether-substrate-bundle = { path = "../../crates/aether-substrate-bundle" }
pollster = "0.4.0"
serde_yml = "0.0.12"
wgpu = "29.0.1"
