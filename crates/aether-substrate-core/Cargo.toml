[package]
name = "aether-substrate-core"
version.workspace = true
edition.workspace = true

# ADR-0035 Phase 1: runtime (wasmtime host, mail scheduler, kind
# manifest, registry, control-plane dispatch, hub client) factored
# out of `aether-substrate` so the same runtime can power multiple
# chassis (desktop today, headless + hub incoming). Winit + pollster
# stay chassis-side; wgpu + png are gated behind the optional
# `render` feature so chassis that don't render (headless, hub) skip
# the wgpu/png compile entirely.

[features]
# Issue 421: chassis that draw enable `render` to pull in the shared
# offscreen pipeline + capture path. Headless and hub leave it off
# and never link wgpu.
render = ["dep:wgpu", "dep:png"]

[dependencies]
aether-hub-protocol = { path = "../aether-hub-protocol" }
aether-mail = { path = "../aether-mail" }
aether-kinds = { path = "../aether-kinds" }
bytemuck = "1.19"
postcard = { version = "1.1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# ADR-0060 guest-side logging: the `aether.sink.log` handler bridges
# decoded `LogEvent` payloads back into the host tracing pipeline.
# `log::log!(target: dyn, lvl, ...)` accepts a dynamic target the
# `tracing-log` integration in `tracing-subscriber` (default feature)
# lifts into a tracing event, so the chassis EnvFilter sees the
# guest's reported target without us hand-rolling a Metadata cache.
log = "0.4"
# ADR-0041 I/O namespace defaults. `dirs` resolves XDG on Linux,
# Application Support on macOS, AppData on Windows without reimple-
# menting platform-specific path logic per chassis.
dirs = "5"
# ADR-0043 net sink — blocking HTTP client with rustls TLS, no
# tokio. `ureq` 3.x pulls rustls + webpki-roots transitively;
# `url` parses URLs for allowlist host extraction.
ureq = { version = "3", features = ["rustls"] }
url = "2"
wasmtime = "30"
# Render-only deps; gated by the `render` feature. Headless + hub
# don't enable the feature, so wgpu's transitive graph stays out of
# their builds.
wgpu = { version = "29.0.1", optional = true }
png = { version = "0.17", optional = true }
# Wasmtime 30 doesn't expose `custom_sections` on `Module`; use
# wasmparser directly to walk the raw wasm bytes for the ADR-0028
# `aether.kinds` section. Pin to the version wasmtime re-exports
# transitively so we stay on a single compiled copy.
wasmparser = "0.224"

[dev-dependencies]
wat = "1"
