[package]
name = "aether-substrate-test-bench"
version.workspace = true
edition.workspace = true

# ADR-0067 test-bench chassis binary: GPU-capable, no window, no
# winit. Mirrors the desktop chassis's offscreen render path
# (offscreen color target + depth target + capture readback) but
# omits surface acquisition and presentation. The shared runtime
# (scheduler, mail, wasmtime host, control plane, hub client) lives
# in aether-substrate-core; this crate binds that core to a wgpu
# device with no presentation surface — suitable for CI scenario
# verification and Rust integration tests where opening a window
# isn't an option.
#
[[bin]]
name = "aether-substrate-test-bench"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dependencies]
aether-substrate-core = { path = "../aether-substrate-core", features = ["render"] }
aether-substrate = { path = "../aether-substrate" }
aether-data = { path = "../aether-data" }
aether-kinds = { path = "../aether-kinds" }
bytemuck = "1.19"
png = "0.17"
pollster = "0.4.0"
postcard = { version = "1.1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
wasmtime = "30"
wgpu = "29.0.1"

# Phase 3 substrate-feature scenarios (issue 430). Tests boot a
# `TestBench` and load `aether-test-fixture-probe`'s wasm to exercise
# input subscription, drop_component, etc. The fixture is the only
# component crate that's a dev-dep here — production code never
# touches it.
[dev-dependencies]
aether-test-fixture-probe = { path = "../aether-test-fixture-probe" }
# Re-uses the visual/PNG helpers (`decode_png`, `differs_from_background`)
# and the shared `test_helpers` module (issue 460) the per-component
# scenarios already exercise; avoids reinventing pixel-diff plumbing
# and boilerplate skip-or-panic gating in the test-bench's own
# scenarios.
aether-scenario = { path = "../aether-scenario" }
