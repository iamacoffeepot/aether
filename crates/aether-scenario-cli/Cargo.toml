[package]
name = "aether-scenario-cli"
version.workspace = true
edition.workspace = true

# Thin CLI wrapper around `aether-scenario`. Takes a path to a YAML
# scenario script, boots a TestBench, runs the script, prints a
# report, exits 0 on pass / 1 on fail. The agent-facing entry point —
# component developers running scenarios from the IDE use the
# `scenario_dir!` proc-macro instead (`aether-scenario-macros`).

[[bin]]
name = "aether-scenario"
path = "src/main.rs"

[dependencies]
aether-scenario = { path = "../aether-scenario" }

# `cli_round_trip.rs` reaches `aether_scenario::test_helpers::has_wgpu_adapter`
# for the same skip-on-driverless gating as the library tests. Pulling
# the helper from the published crate API drops the local pollster +
# wgpu dev-deps (issue 460).
