[package]
name = "aether-substrate"
version.workspace = true
edition.workspace = true

# ADR-0035 Phase 1: runtime (wasmtime host, mail scheduler, kind
# manifest, registry, control-plane dispatch, hub client) for the
# substrate. Powers every chassis (desktop, headless, hub, test-bench)
# from `aether-substrate-bundle`. Winit + pollster stay bundle-side;
# wgpu + png are gated behind the optional `render` feature so
# chassis that don't render (headless, hub) skip the wgpu/png
# compile entirely.

[features]
default = ["wasm"]
# iamacoffeepot/aether#1275: `wasm` pulls in the wasmtime host + the
# wasm-component module surface. Default-on so every existing consumer
# keeps the same compile graph; the only opt-out is `aether-derive`'s
# trybuild dev-dep, which sets `default-features = false` so its UI
# fixtures don't cold-compile wasmtime per fixture binary.
wasm = ["dep:wasmtime", "dep:wasmparser"]
# Issue 421: chassis that draw enable `render` to pull in the shared
# offscreen pipeline + capture path. Headless and hub leave it off
# and never link wgpu.
render = ["dep:wgpu", "dep:png"]
# ADR-0070 phase 3 (part 4): chassis with an audio device enable
# `audio` to pull in the cpal-backed synth + the `aether.sink.audio`
# capability. Headless and hub leave it off; desktop turns it on.
audio = ["dep:cpal"]

[dependencies]
# ADR-0074 Phase 2: target-agnostic actor SDK. Capabilities own a
# `NativeBinding` instance (in `crate::native_transport`) and pass
# `&self.transport` into the SDK's `Sink<K, T>` /
# `Ctx<'_, T>` machinery — same shape the wasm guest path uses
# through `WasmTransport`. The trait takes `&self` so per-actor
# state lives in struct fields, not a thread-local.
aether-actor = { path = "../aether-actor" }
aether-data = { path = "../aether-data" }
# ADR-0090 unit g (iamacoffeepot/aether#1264): `#[derive(Config)]` lives
# in `aether-derive` and is re-exported here as `aether_substrate::Config`,
# the user-facing path callers write. Mirrors how `aether-data`
# re-exports `aether-data-derive`'s `#[derive(Kind, Schema)]`.
aether-derive = { path = "../aether-derive" }
aether-kinds = { path = "../aether-kinds" }
bytemuck = "1.19"
# ADR-0090: typed, layered config resolution. Backs the env-shaped
# `*Layer` structs (`PersistConfig`, the DAG `Caps` + `ExecutorConfig`)
# that resolve each chassis-resolved config's `from_env`.
# `default-features = false` keeps it env-only — no TOML/YAML file
# parsers until ADR-0090's config-file step. aether-substrate is a
# native-only crate (wasmtime feature-gated since iamacoffeepot/aether#1275
# but default-on), so this is a plain dep, not feature-gated like the
# capabilities crate's confique.
confique = { version = "0.4", default-features = false }
# ADR-0049 on-disk handle store: resolve the default persistence root
# (`dirs::data_dir()/aether/handles`). Same crate the fs cap uses.
dirs = "6"
postcard = { version = "1.1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
# ADR-0081 §4 crash dump: serialize the panicking actor's ring as
# JSONL on a panic-hook write path. Read-side consumers (operator
# `jq` queries) match.
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
wasmtime = { version = "44", optional = true }
# Render-only deps; gated by the `render` feature. Headless + hub
# don't enable the feature, so wgpu's transitive graph stays out of
# their builds.
wgpu = { version = "29.0.1", optional = true }
png = { version = "0.18", optional = true }
# Audio-only deps; gated by the `audio` feature. Desktop enables it,
# headless and hub do not.
cpal = { version = "0.17", optional = true }
# ADR-0080 trace queue (always on — substrate-wide tracing).
crossbeam-queue = "0.3"
# Issue 635 PR B worker-pool ready queue. MPMC channel — std mpsc is
# single-consumer so it can't load-balance across pool workers. Still
# used for settlement/capture one-shots + the close-done signal; the
# pool ready-queue moved to `crossbeam-deque` (ADR-0087 Phase 3a).
crossbeam-channel = "0.5"
# ADR-0087 Phase 3a (iamacoffeepot/aether#1112): per-worker work-stealing
# deques + a shared injector replace the single shared ready channel —
# the blob (Phase 3b) becomes the stealable unit.
crossbeam-deque = "0.8"
# Wasmtime 30 doesn't expose `custom_sections` on `Module`; use
# wasmparser directly to walk the raw wasm bytes for the ADR-0028
# `aether.kinds` section. Pin to the version wasmtime re-exports
# transitively so we stay on a single compiled copy.
wasmparser = { version = "0.249", optional = true }
# Registry hot-path maps (#1067): FxHashMap on the id-keyed `mailboxes`
# and `kinds` tables. Keys are pre-hashed 64-bit ids (ADR-0029/0030), so
# SipHash's DoS resistance buys nothing here — Fx is faster per lookup and
# every routed mail hits both maps. `name_index` keeps SipHash (string keys).
rustc-hash = "2"

# ADR-0049 §7 lockfile liveness check: `kill(pid, 0)` to detect whether
# a lock-holding PID is still alive. Unix-only; the lockfile path is
# gated to `#[cfg(unix)]` (substrate on Windows is deferred per
# ADR-0049 §7).
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
wat = "1"
# Issue 552 stage 1: integration tests for the macro-emitted
# NativeActor/NativeDispatch path use the Kind/Schema derives + Pod
# derives. Dev-deps merge with the regular deps' feature sets, so the
# test binary picks up the derive macros without the lib pulling them
# in for non-test builds.
aether-data = { path = "../aether-data", features = ["derive"] }
# iamacoffeepot/aether#1134: integration tests build `OwnedDispatch`
# literals, which now carry a `t_enqueue: Nanos` field — naming the type
# needs aether-kinds in scope (integration tests see only the lib +
# dev-deps, not the lib's regular deps).
aether-kinds = { path = "../aether-kinds" }
bytemuck = { version = "1.19", features = ["derive"] }

[lints]
workspace = true
