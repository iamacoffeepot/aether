[package]
name = "aether-substrate"
version.workspace = true
edition.workspace = true

# ADR-0035 Phase 1: runtime moved to aether-substrate-core. This crate
# is the desktop chassis binary — winit event loop + wgpu renderer +
# frame capture. Phase 2 will rename this to aether-substrate-desktop.

[dependencies]
aether-substrate-core = { path = "../aether-substrate-core" }
aether-hub-protocol = { path = "../aether-hub-protocol" }
aether-mail = { path = "../aether-mail" }
aether-kinds = { path = "../aether-kinds" }
bytemuck = "1.19"
os_info = { version = "3", default-features = false }
png = "0.17"
pollster = "0.4.0"
postcard = { version = "1.1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
wasmtime = "30"
wgpu = "29.0.1"
winit = "0.30.13"

[dev-dependencies]
wat = "1"
