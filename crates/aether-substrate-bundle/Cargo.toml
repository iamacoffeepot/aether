[package]
name = "aether-substrate-bundle"
version.workspace = true
edition.workspace = true

# Multi-binary chassis crate. Holds the desktop, headless, and hub
# chassis source as submodules (`src/<chassis>/`), plus the hub
# library (substrate-side client, wire types, MCP coordinator)
# under `src/hub/`. Each chassis produces a binary via
# `src/bin/<chassis>.rs`. The shared substrate runtime stays in
# `aether-substrate`; this crate is the per-deployment chassis
# layer.
#
# `aether-substrate-test-bench` stays as its own crate because it
# exposes a `TestBench` library API that components, the scenario
# runner, and demos depend on.

[lib]
path = "src/lib.rs"

[[bin]]
name = "aether-substrate"
path = "src/bin/desktop.rs"

[[bin]]
name = "aether-substrate-headless"
path = "src/bin/headless.rs"

[[bin]]
name = "aether-substrate-hub"
path = "src/bin/hub.rs"

[dependencies]
aether-substrate = { path = "../aether-substrate", features = ["render", "audio"] }
aether-data = { path = "../aether-data" }
aether-codec = { path = "../aether-codec" }
aether-kinds = { path = "../aether-kinds" }
axum = "0.8"
base64 = "0.22"
bytemuck = { version = "1.19", features = ["derive"] }
os_info = { version = "3", default-features = false }
png = "0.17"
pollster = "0.4.0"
postcard = { version = "1.1", default-features = false, features = ["alloc"] }
rmcp = { version = "0.8", features = [
    "server",
    "macros",
    "transport-streamable-http-server",
] }
schemars = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time", "signal", "process", "fs"] }
tokio-util = "0.7"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
wasmtime = "30"
wgpu = "29.0.1"
winit = "0.30.13"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time"] }
wat = "1"
