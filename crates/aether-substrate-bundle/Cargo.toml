[package]
name = "aether-substrate-bundle"
version.workspace = true
edition.workspace = true
license.workspace = true

# Multi-binary chassis crate. Holds the desktop, headless, hub, and
# test-bench chassis source as submodules (`src/<chassis>/`). Each
# chassis produces a binary via `src/bin/<chassis>.rs`. The shared
# substrate runtime stays in `aether-substrate`; this crate is the
# per-deployment chassis layer.
#
# The in-process `TestBench` API surfaces as
# `aether_substrate_bundle::test_bench::TestBench` for component +
# scenario runner consumers.

[lib]
path = "src/lib.rs"

[[bin]]
name = "aether-substrate"
path = "src/bin/desktop.rs"

[[bin]]
name = "aether-substrate-headless"
path = "src/bin/headless.rs"

[[bin]]
name = "aether-substrate-hub"
path = "src/bin/hub.rs"

[[bin]]
name = "aether-substrate-test-bench"
path = "src/bin/test-bench.rs"

# Standalone bundle builds (#1529, generalizing #1518): a chassis that
# auto-loads the component pack embedded at build time, so the binary
# runs hub-less. `build.rs` stages the pack the bins embed; `cargo xtask
# bundle --chassis {desktop|headless}` builds the component wasms and
# drives this.
[[bin]]
name = "aether-bundle-desktop"
path = "src/bin/aether-bundle-desktop.rs"

[[bin]]
name = "aether-bundle-headless"
path = "src/bin/aether-bundle-headless.rs"

# Perf-comparison tooling (iamacoffeepot/aether#1077). `perf-trial` runs
# one latency sweep and emits a TrialReport JSON; `perf-compare`
# interleaves K base/candidate trials and renders the noise-aware paired
# comparison (ADR-0085).
[[bin]]
name = "aether-perf-trial"
path = "src/bin/perf-trial.rs"

[[bin]]
name = "aether-perf-compare"
path = "src/bin/perf-compare.rs"

# iamacoffeepot/aether#1155: renders per-cell queued/drain/handler sample
# distributions to PNGs.
[[bin]]
name = "aether-perf-plot"
path = "src/bin/perf-plot.rs"

# The `runtime` feature exists solely to drive the `#[actor]` split
# path's hardcoded `feature = "runtime"` gate (the macro convention from
# iamacoffeepot/aether#2311 / ADR-0122): a split cap's `NativeActor` /
# `Lifecycle` / `NativeDispatch` impls compile only when this feature is
# active. The bundle never builds to wasm and has no transport-only
# consumer, so it is default-on. `aether-substrate` / `aether-capabilities`
# already arrive with their own `runtime` defaults via the
# non-`default-features = false` deps below, so no forwarding is needed.
[features]
default = ["runtime"]
runtime = []

[dependencies]
aether-substrate = { path = "../aether-substrate", features = ["render"] }
aether-capabilities = { path = "../aether-capabilities", features = ["render-runtime", "audio-runtime", "text-runtime", "ui-runtime"] }
# The space-time reachability subsystem (issue 1908). `native` pulls the
# `TrajectoryRecorderCapability` the chassis registers; the dependency edge
# is also what links its certifier `#[transform]`s into the headless
# binary's `TransformRegistry::from_inventory` (a dropped edge silently
# de-registers them with no compile error).
aether-labyrinth = { path = "../aether-labyrinth", features = ["native"] }
aether-actor = { path = "../aether-actor" }
aether-data = { path = "../aether-data" }
aether-kinds = { path = "../aether-kinds" }
# Chassis-binary argv parsing (ADR-0090 unit d, issue 1258). The
# `cli` module declares per-chassis Parser roots and per-cap overlay
# structs; each chassis bin calls `<Cli>::parse()` and threads the
# resolved overlays through `*Env::from_env_with_argv(cli)`.
clap = { workspace = true }
# Each overlay assembles a partial `<*ConfigLayer as confique::Config>::Layer`;
# the cap's `from_argv_then_env` then preloads it into the confique
# builder ahead of `.env()`. Direct dep so cli.rs can name the
# `confique::Layer` trait without reaching through aether-capabilities.
confique = { workspace = true }
# Catch-all error type for chassis main()s + build_passive that
# bridge BootError / wasmtime / io faults purely to bubble up.
# Same crate as `wasmtime::Result` re-exports (issue #571).
anyhow = { workspace = true }
bytemuck = { workspace = true, features = ["derive"] }
png = { workspace = true }
pollster = "0.4.0"
# iamacoffeepot/aether#1155: distribution-plot rendering for the
# `perf-plot` bin. `ab_glyph` keeps fonts pure-Rust (no font-kit / system
# freetype — headless-CI friendly); we render to an RGB buffer and encode
# with the `png` dep above, so no `image` / `bitmap_encoder` pull. Not
# feature-gated: a few small pure-Rust crates next to the chassis's
# wgpu/wasmtime aren't worth gating off the build for, and gating left the
# bin uncovered by Qodana / clippy (the "missing features" finding).
plotters = { version = "0.3", default-features = false, features = [
    "bitmap_backend",
    "ab_glyph",
    "line_series",
] }
# `rmcp` / `axum` / `base64` / `schemars` retired with the embedded MCP
# server (issue 763 P5e) — the harness moved out-of-process into the
# `aether-mcp` crate, which owns those deps now.
serde = { workspace = true, features = ["derive", "std"] }
# Trial reports + comparison output are JSON (perf tooling, #1077).
serde_json = { workspace = true }
# `visual::ImageError` derives `thiserror::Error` (moved from
# `aether-scenario` per issue 821, promoted to crate root per issue 1781).
# New runtime dep here because `aether-substrate-bundle` had no prior
# thiserror consumer.
thiserror = "2"
tracing = { workspace = true, features = ["std", "attributes"] }
wgpu = { workspace = true }
winit = "0.30.13"

# Hub chassis blocks on a SIGINT/SIGTERM signal in
# `HubServerDriverRunning::run`. Tokio retired alongside the embedded
# MCP + engine listener (issue 763 P5e/P5f); signal-hook is a much
# smaller dep and runs synchronously on the calling thread — no async
# runtime to host, no mio/tokio-macros transitive build cost.
# signal-hook is Unix-only; the Windows fallback rides `ctrlc` for
# Ctrl-C only (matches the pre-tokio-retirement behavior, which also
# distinguished SIGINT/SIGTERM only on Unix).
[target.'cfg(unix)'.dependencies]
signal-hook = "0.4"

[target.'cfg(windows)'.dependencies]
ctrlc = "3"

[build-dependencies]
# `build.rs` parses the `AETHER_BUNDLE_MANIFEST` JSON and encodes the
# bundle pack through `src/bundle_pack.rs` (compiled in via `#[path]`,
# #1529), so the build script needs serde + serde_json in build scope.
serde = { workspace = true, features = ["derive", "std"] }
serde_json = { workspace = true }

[dev-dependencies]
# Test-bench Phase 3 substrate-feature scenarios (issue 430). Tests
# boot a `TestBench` and load the fixture component wasm to exercise
# input subscription, drop_component, etc. The shared `Kind`
# definitions the tests decode + assert against live in the
# `aether-test-fixtures-kinds` rlib; the wasm bodies are separate
# component crates discovered structurally and loaded by stem. The
# bench's own integration tests reach the visual/PNG helpers +
# `test_helpers` module through `crate::test_bench::{visual,
# test_helpers}` directly (post-issue-821, formerly via
# `aether-scenario`).
# Length-prefix frame helpers (`aether_codec::frame::{read_frame,
# write_frame}`) used by the RPC engine-routing + FleetBench integration
# tests; no `src/` consumer, so it rides dev-dependencies only.
aether-codec = { path = "../aether-codec" }
aether-test-fixtures-kinds = { path = "../aether-test-fixtures/aether-test-fixtures-kinds" }
# iamacoffeepot/aether#2455: the dispatch-decode-failure regression test drives
# the `Probe` fixture directly through the pub `Component::instantiate` / `deliver`
# API, which needs `wasmtime::{Engine, Linker, Module}` in scope to build the
# host engine + linker. Same workspace pin `aether-substrate` links against.
wasmtime = { workspace = true }
# iamacoffeepot/aether#1472: the FleetBench Transform-DAG test builds a
# descriptor with `output_kind_id == Vec4::ID` and casts the observer's
# surfaced 16 bytes back to a `Vec4` for the `M·v` assertion, so it names
# `aether_math::Vec4` directly.
aether-math = { path = "../aether-math" }
# iamacoffeepot/aether#1037: the cap-registry replace test swaps the
# probe wasm for the camera wasm (a distinct handler set) and asserts
# the registry reflects the new accept-set. The camera folded into
# `aether-kit` as a non-entry export (issue 1996), so the kind types
# (`aether_kit::camera::CameraCreate`, etc.) come from kit.
# `default-features = false` pulls in only the trunk kind types for
# their `::ID`s — the `runtime` module's `export!()` FFI emission is
# wasm32-only and inert in a host rlib anyway, but skipping it keeps
# the host test build lean.
aether-kit = { path = "../aether-kit", default-features = false }
# iamacoffeepot/aether#1057: the mail-latency harness (`test_bench::mail_latency`)
# subscribes to per-root `Settled` notifications to wait for injected
# trace trees to drain; naming the settlement `Receiver<()>` returned by
# `SettlementRegistry::subscribe_settlement` needs crossbeam-channel in
# direct scope. Test-only.
crossbeam-channel = "0.5"
# iamacoffeepot/aether#1854: the `aether.text.font_metrics` e2e grab
# (`font_metrics_grab_measures_like_the_draw_path`) computes the draw
# path's advance sum directly with fontdue as the ground truth the
# guest-side cached measurement must reproduce bit-for-bit. Same crate
# the text cap parses fonts with; test-only here.
fontdue = "0.9"

[lints]
workspace = true
