[package]
name = "aether-substrate-bundle"
version.workspace = true
edition.workspace = true

# Multi-binary chassis crate. Holds the desktop, headless, hub, and
# test-bench chassis source as submodules (`src/<chassis>/`). Each
# chassis produces a binary via `src/bin/<chassis>.rs`. The shared
# substrate runtime stays in `aether-substrate`; this crate is the
# per-deployment chassis layer.
#
# The in-process `TestBench` API surfaces as
# `aether_substrate_bundle::test_bench::TestBench` for component +
# scenario runner consumers.

[lib]
path = "src/lib.rs"

[[bin]]
name = "aether-substrate"
path = "src/bin/desktop.rs"

[[bin]]
name = "aether-substrate-headless"
path = "src/bin/headless.rs"

[[bin]]
name = "aether-substrate-hub"
path = "src/bin/hub.rs"

[[bin]]
name = "aether-substrate-test-bench"
path = "src/bin/test-bench.rs"

# Perf-comparison tooling (iamacoffeepot/aether#1077). `perf-trial` runs
# one latency sweep and emits a TrialReport JSON; `perf-compare`
# interleaves K base/candidate trials and renders the noise-aware paired
# comparison (ADR-0085).
[[bin]]
name = "aether-perf-trial"
path = "src/bin/perf-trial.rs"

[[bin]]
name = "aether-perf-compare"
path = "src/bin/perf-compare.rs"

[dependencies]
aether-substrate = { path = "../aether-substrate", features = ["render", "audio"] }
aether-capabilities = { path = "../aether-capabilities", features = ["render-native", "audio-native"] }
aether-actor = { path = "../aether-actor" }
aether-data = { path = "../aether-data" }
aether-codec = { path = "../aether-codec" }
aether-kinds = { path = "../aether-kinds" }
# Catch-all error type for chassis main()s + build_passive that
# bridge BootError / wasmtime / io faults purely to bubble up.
# Same crate as `wasmtime::Result` re-exports (issue #571).
anyhow = "1"
bytemuck = { version = "1.19", features = ["derive"] }
png = "0.18"
pollster = "0.4.0"
postcard = { version = "1.1", default-features = false, features = ["alloc"] }
# `rmcp` / `axum` / `base64` / `schemars` retired with the embedded MCP
# server (issue 763 P5e) — the harness moved out-of-process into the
# `aether-mcp` crate, which owns those deps now.
serde = { version = "1", features = ["derive"] }
# Trial reports + comparison output are JSON (perf tooling, #1077).
serde_json = "1"
# `test_bench::visual::ImageError` derives `thiserror::Error` (moved
# from `aether-scenario` per issue 821). New runtime dep here because
# `aether-substrate-bundle` had no prior thiserror consumer.
thiserror = "2"
tracing = "0.1"
wgpu = "29.0.1"
winit = "0.30.13"

# Hub chassis blocks on a SIGINT/SIGTERM signal in
# `HubServerDriverRunning::run`. Tokio retired alongside the embedded
# MCP + engine listener (issue 763 P5e/P5f); signal-hook is a much
# smaller dep and runs synchronously on the calling thread — no async
# runtime to host, no mio/tokio-macros transitive build cost.
# signal-hook is Unix-only; the Windows fallback rides `ctrlc` for
# Ctrl-C only (matches the pre-tokio-retirement behavior, which also
# distinguished SIGINT/SIGTERM only on Unix).
[target.'cfg(unix)'.dependencies]
signal-hook = "0.4"

[target.'cfg(windows)'.dependencies]
ctrlc = "3"

[dev-dependencies]
# Test-bench Phase 3 substrate-feature scenarios (issue 430). Tests
# boot a `TestBench` and load `aether-test-fixture-probe`'s wasm to
# exercise input subscription, drop_component, etc. The bench's own
# integration tests reach the visual/PNG helpers + `test_helpers`
# module through `crate::test_bench::{visual, test_helpers}` directly
# (post-issue-821, formerly via `aether-scenario`).
aether-test-fixture-probe = { path = "../aether-test-fixture-probe" }
# iamacoffeepot/aether#1037: the cap-registry replace test swaps the
# probe wasm for the camera wasm (a distinct handler set) and asserts
# the registry reflects the new accept-set. `default-features = false`
# pulls in only the camera kind types (`CameraCreate`, etc.) for their
# `::ID`s — the `runtime` module's `export!()` FFI emission is wasm32-
# only and inert in a host rlib anyway, but skipping it keeps the host
# test build lean.
aether-camera = { path = "../aether-camera", default-features = false }
# iamacoffeepot/aether#1057: the mail-latency harness (`test_bench::mail_latency`)
# subscribes to per-root `Settled` notifications to wait for injected
# trace trees to drain; naming the settlement `Receiver<()>` returned by
# `SettlementRegistry::subscribe_settlement` needs crossbeam-channel in
# direct scope. Test-only.
crossbeam-channel = "0.5"

[lints]
workspace = true
