[package]
name = "aether-substrate-hub"
version.workspace = true
edition.workspace = true

# ADR-0071 phase 7d-2 collapsed this crate to a binary-only entry
# point: every module the hub needs (the engine listener, MCP
# transport, session/registry/spawn/log_store stores, loopback
# substrate, chassis + driver capability) lives in `aether-hub`.
# `main.rs` reads env vars and calls `HubChassis::build(env)?.run()`.

[[bin]]
name = "aether-substrate-hub"
path = "src/main.rs"

[dependencies]
aether-hub = { path = "../aether-hub" }
wasmtime = "30"
