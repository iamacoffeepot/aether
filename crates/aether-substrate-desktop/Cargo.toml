[package]
name = "aether-substrate-desktop"
version.workspace = true
edition.workspace = true

# ADR-0035 desktop chassis binary: winit event loop, wgpu renderer,
# frame capture, platform info. The shared runtime (scheduler, mail,
# wasmtime host, control plane, hub client) lives in
# aether-substrate-core; this crate binds that core to the desktop
# peripheral stack. The binary is still named `aether-substrate` so
# existing `spawn_substrate` paths, docs, and tool scripts keep
# working — the package is what got renamed.

[[bin]]
name = "aether-substrate"
path = "src/main.rs"

[dependencies]
aether-substrate-core = { path = "../aether-substrate-core", features = ["render"] }
aether-hub-protocol = { path = "../aether-hub-protocol" }
aether-mail = { path = "../aether-mail" }
aether-kinds = { path = "../aether-kinds" }
bytemuck = "1.19"
cpal = "0.15"
crossbeam-queue = "0.3"
os_info = { version = "3", default-features = false }
png = "0.17"
pollster = "0.4.0"
postcard = { version = "1.1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
wasmtime = "30"
wgpu = "29.0.1"
winit = "0.30.13"

[dev-dependencies]
wat = "1"
