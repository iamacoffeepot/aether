[package]
name = "aether-scenario"
version.workspace = true
edition.workspace = true

# ADR-0067 scenario library: declarative Script → Runner → RunReport
# pipeline that drives an in-process `TestBench` chassis through a
# sequence of steps and asserts visual properties of captured frames.
#
# Issue 821 PR 1 retired the YAML half (parser, bin, scenario_dir!
# proc-macro) and relocated `test_helpers` + `visual` into
# `aether_substrate_bundle::test_bench`. This crate is now a thin
# layer exposing the `Script` / `Step` / `Check` / `Runner` Rust
# vocabulary plus shimmed re-exports of the relocated helpers.
# Issue 821 PR 2 will inline the vocabulary at the four consumer
# call sites and retire the crate.

[lib]
path = "src/lib.rs"

[dependencies]
aether-data = { path = "../aether-data" }
aether-kinds = { path = "../aether-kinds" }
aether-codec = { path = "../aether-codec" }
aether-substrate-bundle = { path = "../aether-substrate-bundle" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `Step::SendMail.params` carries a `serde_yml::Value` so consumers
# can build the parameter tree using YAML idioms (string-keyed maps,
# scalars, arrays). Retires in PR 2 of issue 821 along with the
# Script vocabulary.
serde_yml = "0.0.12"
thiserror = "1"
