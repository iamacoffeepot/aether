[package]
name = "aether-test-fixtures"
version.workspace = true
edition.workspace = true
license.workspace = true

# Shared test-fixture crate. The `lib` rlib holds Kind definitions and
# helpers shared with the integration tests (and visible as
# `aether_test_fixtures::{TickObserved, SetRender, ProbeConfig, â€¦}`).
# Per-fixture wasm components live as `[[example]]` cdylibs that
# depend on the lib â€” each example produces its own
# `target/wasm32-unknown-unknown/{profile}/examples/<name>.wasm`.
# Issue 1994 consolidated related fixtures into multi-actor bundles
# (ADR-0096): `probe` carries `ProbeWithConfig`; `inline_child` carries
# `InlineStatefulParent/Child` and `InlineDespawnParent`; `mat4_source`
# carries `Vec4Observer`. Consumers address an in-bundle actor by
# passing `export: Some("<NAMESPACE>")` on the load call.
[lib]
crate-type = ["rlib"]

[dependencies]
aether-data = { path = "../aether-data", features = ["derive"] }
# Issue 1472: `Vec4Observed { input: Ref<Vec4> }` carries the
# `aether.math.vec4` kind in its `Ref` slot, so the shared lib needs
# `Vec4`. `aether-math` is `no_std`, keeping this rlib `no_std`.
aether-math = { path = "../aether-math" }
bytemuck = { workspace = true, default-features = false, features = ["derive"] }
serde = { workspace = true, default-features = false, features = ["derive"] }

[dev-dependencies]
aether-actor = { path = "../aether-actor" }
aether-kinds = { path = "../aether-kinds" }
# `default-features = false` exercises the issue 552 stage 4 wasm-header-only
# build of aether-capabilities â€” the cap markers (Actor / Singleton /
# HandlesKind) compile for wasm without dragging the native runtime in.
# `render` opts into the marker layer for `RenderCapability`; `audio`
# is unused here, omitted on purpose.
aether-capabilities = { path = "../aether-capabilities", default-features = false, features = ["render"] }
# Issue #581: the probe emits `tracing::info!` on the first tick; the
# actor-aware subscriber installed by `export!()` buffers + drains it
# to LogCapability.
tracing = { workspace = true, default-features = false }

# ADR-0090 c1 reference fixture bundle (issue 1994): the entry `Probe`
# plus the typed-config `ProbeWithConfig` (`export: Some("test_fixtures_probe_with_config")`).
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/probe.wasm
[[example]]
name = "probe"
crate-type = ["cdylib"]

# ADR-0096 multi-actor module fixture: two FfiActor types exported from
# one crate via `export!(RootManager, Panel)`. Cross-builds to one wasm
# module carrying both; an unmodified host loads the entry type.
[[example]]
name = "multi_actor"
crate-type = ["cdylib"]

# ADR-0101 stateful-replace fixture: a multi-actor module
# (`export!(Counter, Sidecar)`) whose entry `Counter` overrides the
# `on_dehydrate` / `on_rehydrate` hooks so its counter survives a
# `replace_component` swap. Proves multi-actor hot-swap state continuity
# now that the hooks are FfiActor defaults.
[[example]]
name = "stateful_replace"
crate-type = ["cdylib"]

# ADR-0113 declarative-state fixture: a single-actor `Counter` that
# declares `type State = CounterState` plus the `dehydrate` / `rehydrate`
# accessors, so `#[actor]` generates the hooks. The counter survives a
# same-wasm `replace_component` swap with no hand-written hooks.
[[example]]
name = "stateful_replace_typed"
crate-type = ["cdylib"]

# ADR-0113 decode-miss companion: same `NAMESPACE` / `CounterState` kind
# name but a reshaped state shape (added field â†’ different `Kind::ID`).
# Replacing the typed fixture with this one makes the generated
# `on_rehydrate` miss the decode and boot fresh.
[[example]]
name = "stateful_replace_reshaped"
crate-type = ["cdylib"]

# Issue 1454: cube render fixture. Emits a twelve-triangle world-space
# unit cube under a fixed `view_proj` so the TestBench cube scenario can
# assert the camera + depth + readback pipeline.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/cube.wasm
[[example]]
name = "cube"
crate-type = ["cdylib"]

# Issue 1472 DAG fixture bundle (issue 1994): entry `MatSource` plus
# `Vec4Observer` (`export: Some("vec4_observer")`).
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/mat4_source.wasm
[[example]]
name = "mat4_source"
crate-type = ["cdylib"]

# Issue 1793 widget-actor cost spike: a synthetic UI widget that
# subscribes Tick and, per its `UiWidgetConfig`, either re-emits a
# `DrawSolidQuads` batch every frame (naive actor-backed) or early-returns
# (the stable-frame floor host-cached replay would pay). Loaded NĂ— by the
# `widget_actor_cost` measurement to read per-widget per-frame cost.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/ui_widget.wasm
[[example]]
name = "ui_widget"
crate-type = ["cdylib"]

# Issue 1762: reference HTTP handler fixture for the serving-http e2e
# test and recipe. Handles `aether.http.server.request` with a path
# match (/ â†’ 200, else 404) and replies `aether.http.server.response`.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/http_handler.wasm
[[example]]
name = "http_handler"
crate-type = ["cdylib"]

# ADR-0114 inline-child fixture bundle (issue 1994): entry `InlineParent`
# (#1916) plus `InlineStatefulParent` (`export: Some("test.inline.stateful_parent")`
# â€” ADR-0114 Â§5 hot-swap, #1930) and `InlineDespawnParent`
# (`export: Some("test.inline.despawn_parent")` â€” teardown, #1939).
# NOT bundled: `stateful_replace{,_typed,_reshaped}` â€” the typedâ†’reshaped
# cross-module replace test (`test_bench_scenario.rs`) loads one wasm and
# replaces it with the other; a cross-module replace needs two distinct wasm
# binaries, so these cannot share a bundle.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/inline_child.wasm
[[example]]
name = "inline_child"
crate-type = ["cdylib"]

# Issue 1958: `source_mailbox()` end-to-end fixture. A `SourceObserver`
# actor with two handlers: `on_send_source_query` forwards a `SourceQuery`
# to a runtime-supplied `MailboxId` (proving component-origin attribution),
# and `on_source_query` (manual) reads `ctx.source_mailbox()` and broadcasts
# `SourceReport { mailbox_id }` to the test-bench observer.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/source_observer.wasm
[[example]]
name = "source_observer"
crate-type = ["cdylib"]

# Issue 1977 (ADR-0114 amendment) cluster-addressing matrix fixture: the
# multi-actor entry `MatrixParent` spawns two inline children (`a`, `b`) and,
# on `RunMatrix`, drives every in-cluster addressing direction in place plus
# one cross-cluster send during the drain. Cluster members record what they
# observed into a shared log; `CollectMatrix` replies a `MatrixReport`. The
# FleetBench matrix-sweep test loads it and asserts each cell's delivery +
# the source the recipient read.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/matrix_sweep.wasm
[[example]]
name = "matrix_sweep"
crate-type = ["cdylib"]

[lints]
workspace = true
