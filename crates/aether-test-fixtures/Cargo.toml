[package]
name = "aether-test-fixtures"
version.workspace = true
edition.workspace = true
license.workspace = true

# Shared test-fixture crate. The `lib` rlib holds Kind definitions and
# helpers shared with the integration tests (and visible as
# `aether_test_fixtures::{TickObserved, SetRender, ProbeConfig, â€¦}`).
# Per-fixture wasm components live as `[[example]]` cdylibs that
# depend on the lib â€” each example produces its own
# `target/wasm32-unknown-unknown/{profile}/examples/<name>.wasm`.
#
# Pre-#1256 this crate was `aether-test-fixture-probe` (single-cdylib
# crate). ADR-0090 c1 split the fixture surface so a typed-config
# fixture (`probe_with_config`) can live next to the original probe
# without each fixture being its own member crate.
[lib]
crate-type = ["rlib"]

[dependencies]
aether-data = { path = "../aether-data", features = ["derive"] }
# Issue 1472: `Vec4Observed { input: Ref<Vec4> }` carries the
# `aether.math.vec4` kind in its `Ref` slot, so the shared lib needs
# `Vec4`. `aether-math` is `no_std`, keeping this rlib `no_std`.
aether-math = { path = "../aether-math" }
bytemuck = { workspace = true, default-features = false, features = ["derive"] }
serde = { workspace = true, default-features = false, features = ["derive"] }

[dev-dependencies]
aether-actor = { path = "../aether-actor" }
aether-kinds = { path = "../aether-kinds" }
# `default-features = false` exercises the issue 552 stage 4 wasm-header-only
# build of aether-capabilities â€” the cap markers (Actor / Singleton /
# HandlesKind) compile for wasm without dragging the native runtime in.
# `render` opts into the marker layer for `RenderCapability`; `audio`
# is unused here, omitted on purpose.
aether-capabilities = { path = "../aether-capabilities", default-features = false, features = ["render"] }
# Issue #581: the probe emits `tracing::info!` on the first tick; the
# actor-aware subscriber installed by `export!()` buffers + drains it
# to LogCapability.
tracing = { workspace = true, default-features = false }

# ADR-0090 c1 reference fixture: the pre-1256 probe, now an example
# cdylib. Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/probe.wasm
[[example]]
name = "probe"
crate-type = ["cdylib"]

# ADR-0090 c1 fixture exercising the typed `FfiActor::Config` path â€”
# declares `type Config = ProbeConfig` and receives a seeded config
# struct in its `init` body.
[[example]]
name = "probe_with_config"
crate-type = ["cdylib"]

# ADR-0096 multi-actor module fixture: two FfiActor types exported from
# one crate via `export!(RootManager, Panel)`. Cross-builds to one wasm
# module carrying both; an unmodified host loads the entry type.
[[example]]
name = "multi_actor"
crate-type = ["cdylib"]

# ADR-0101 stateful-replace fixture: a multi-actor module
# (`export!(Counter, Sidecar)`) whose entry `Counter` overrides the
# `on_dehydrate` / `on_rehydrate` hooks so its counter survives a
# `replace_component` swap. Proves multi-actor hot-swap state continuity
# now that the hooks are FfiActor defaults.
[[example]]
name = "stateful_replace"
crate-type = ["cdylib"]

# Issue 1454: cube render fixture. Emits a twelve-triangle world-space
# unit cube under a fixed `view_proj` so the TestBench cube scenario can
# assert the camera + depth + readback pipeline.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/cube.wasm
[[example]]
name = "cube"
crate-type = ["cdylib"]

# Issue 1472: DAG `Source` fixture. Replies a fixed `Mat4Apply` operand
# on `Mat4SourceTrigger`, feeding the `mat4_apply` transform downstream.
# Wasm artifact: target/wasm32-unknown-unknown/{profile}/examples/mat4_source.wasm
[[example]]
name = "mat4_source"
crate-type = ["cdylib"]

# Issue 1472: DAG `Observer` fixture. Resolves the transform's
# `Ref<Vec4>` output and surfaces the value via `aether.fs.write` so the
# FleetBench test can read it back and assert `MÂ·v`.
[[example]]
name = "vec4_observer"
crate-type = ["cdylib"]

[lints]
workspace = true
