[workspace]
resolver = "3"
members = [
    "crates/aether-substrate-core",
    "crates/aether-substrate-desktop",
    "crates/aether-substrate-headless",
    "crates/aether-substrate-hub",
    "crates/aether-kinds",
    "crates/aether-math",
    "crates/aether-component",
    "crates/aether-camera-component",
    "crates/aether-hello-component",
    "crates/aether-mesh-editor-component",
    "crates/aether-player-component",
    "crates/aether-hub-protocol",
    "crates/aether-mail",
    "crates/aether-mail-derive",
    "demos/sokoban",
    "demos/tic-tac-toe",
    "demos/tic-tac-toe-client",
]
# Reference artefacts under spikes/ are standalone Cargo workspaces
# (see ADR-0003 §Consequences) and must be excluded so they aren't
# auto-absorbed into this workspace via the parent-walk.
exclude = ["spikes/*"]

[workspace.package]
version = "0.2.0-alpha"
edition = "2024"
