[recipe]
name = "teapot-on-table-window-morning"
aspect_ratio = "1:1"
camera = "eye level, slight three-quarter, medium close-up"

[environmentals]
lighting = "lighting.window-morning"
condition = "condition.flawless"

[observer]
id = "observer.quiet-domestic"

# Facts in order of intended prompt position. Order is load-bearing — front
# of the prompt carries more weight in image-gen models. Concrete form goes
# first; sensory coloring follows.

[[facts]]
fact = "object.teapot"
lens = "object.rendering-instruction"
order = 1

[[facts]]
fact = "material.glazed-ceramic"
lens = "material.feeling"
lod = "brief"
order = 2

[[facts]]
fact = "surface.wooden-table"
lens = "surface.feeling"
lod = "brief"
order = 3
