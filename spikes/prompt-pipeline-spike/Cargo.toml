# Standalone Cargo workspace so the parent aether workspace doesn't absorb it.
[workspace]

[package]
name = "prompt-pipeline-spike"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "prompt-spike"
path = "src/main.rs"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
sha2 = "0.10"
base64 = "0.22"
ureq = { version = "2.12", features = ["json", "tls"], default-features = false }
