# Reference artefact under spikes/ — standalone Cargo workspace so the
# parent aether workspace doesn't absorb it (see ADR-0003 §Consequences).
#
# Spike for ADR-0026: DSL parser + typed AST + round-trip. Validates the
# Lisp s-expression representation before promoting to a real crate.
[workspace]

[package]
name = "dsl-mesh-spike"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
lexpr = "0.2"
thiserror = "2"

[dev-dependencies]
pretty_assertions = "1"
